<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voidbreak: Planet Siege</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Planet destruction play field">
        <div class="topbar">
          <div>
            <p class="eyebrow">Voidbreak</p>
            <h1>Planet Siege</h1>
          </div>
          <div class="currency" aria-live="polite">
            <span class="currency-mark">◇</span>
            <span id="shards">0</span>
            <span>Void Shards</span>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="game" width="960" height="640"></canvas>
          <div class="planet-hud">
            <span id="planetName">Aurelia</span>
            <strong id="planetHp">100%</strong>
          </div>
        </div>
      </section>

      <aside class="panel" aria-label="Weapons and upgrades">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Arsenal</p>
            <h2>Choose a rupture tool</h2>
          </div>
          <button id="reset" class="icon-button" title="Reset progress" aria-label="Reset progress">↻</button>
        </div>

        <div id="weapons" class="weapons"></div>

        <div class="stats">
          <div>
            <span>Planets broken</span>
            <strong id="destroyed">0</strong>
          </div>
          <div>
            <span>Damage rate</span>
            <strong id="dps">0/s</strong>
          </div>
          <div>
            <span>Current tool</span>
            <strong id="activeWeapon">Ion Harp</strong>
          </div>
        </div>

        <button id="buy" class="primary">Unlock / Upgrade</button>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
