<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voidbreak: Rift Siege</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Planet destruction play field">
        <div class="topbar">
          <div class="brand">
            <p class="eyebrow">Voidbreak</p>
            <h1>Rift Siege</h1>
          </div>
          <div class="resource-bar" aria-live="polite">
            <div class="currency">
              <span class="currency-mark">◇</span>
              <strong id="shards">0</strong>
              <span>Rift Glass</span>
            </div>
            <button id="reset" class="icon-button" title="Reset progress" aria-label="Reset progress">↻</button>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="game" width="1120" height="720"></canvas>
          <div class="scanline"></div>
          <div class="planet-hud">
            <div>
              <span class="hud-label">Target</span>
              <strong id="planetName">Aurelia</strong>
            </div>
            <div class="stability">
              <span id="planetHp">100%</span>
              <div class="meter" aria-hidden="true"><span id="hpFill"></span></div>
            </div>
          </div>
          <div class="combo-card">
            <span>Resonance</span>
            <strong id="combo">x1.0</strong>
          </div>
          <div class="breach-card">
            <span>Core Breach</span>
            <strong id="damageStage">Stable</strong>
          </div>
          <div id="blastText" class="blast-text" aria-live="polite"></div>
        </div>
      </section>

      <aside class="panel" aria-label="Weapons and upgrades">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Rupture Lab</p>
            <h2>Pick, unlock, obliterate</h2>
          </div>
        </div>

        <div class="target-deck">
          <div class="section-head">
            <p class="eyebrow">Solar Targets</p>
            <button id="reform" class="mini-action">Reform</button>
          </div>
          <div id="planets" class="planets" aria-label="Choose a planet"></div>
        </div>

        <div class="focus-card">
          <span id="focusGlyph" class="focus-glyph">⌁</span>
          <div>
            <p id="focusStatus">Armed</p>
            <h3 id="focusName">Ion Harp</h3>
            <span id="focusNote">Resonant arcs fracture crust.</span>
          </div>
        </div>

        <div id="weapons" class="weapons"></div>

        <div class="stats">
          <div>
            <span>Worlds cracked</span>
            <strong id="destroyed">0</strong>
          </div>
          <div>
            <span>Tap force</span>
            <strong id="dps">0/tap</strong>
          </div>
          <div>
            <span>Armed tool</span>
            <strong id="activeWeapon">Ion Harp</strong>
          </div>
        </div>

        <button id="buy" class="primary">Unlock / Upgrade</button>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
